<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="google-site-verification" content="google872e6dfbcea07200" />
    <title>Swiss Russameekiattisak - Academic Repository</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="min-h-screen bg-[#fcfcfc] text-[#1a1a1a]">

    <header class="border-b border-gray-200 bg-white">
        <div class="container mx-auto max-w-4xl px-6 py-8">
            <h1 class="text-3xl font-serif font-bold tracking-tight text-[#002147]">
                Swiss Russameekiattisak
            </h1>
            <p class="mt-2 text-sm uppercase tracking-[0em] text-gray-500 font-medium">
                สวิส รัศมีเกียรติศักดิ์
            </p>
        </div>
    </header>

    <nav class="bg-[#002147] text-white">
        <div class="container mx-auto max-w-4xl px-6 py-3 flex justify-between items-center text-sm">
            <div class="flex gap-6">
                <span class="opacity-80">Research Portfolio</span>
            </div>
            <a href="https://figshare.com/authors/Swiss_Russameekiattisak/21988793" target="_blank" class="hover:underline flex items-center gap-1">
                Figshare Profile <i data-lucide="external-link" class="h-3 w-3"></i>
            </a>
        </div>
    </nav>

    <main class="container mx-auto max-w-4xl px-6 py-12">
        <section class="mb-12">
            <h2 class="text-xl font-serif font-bold border-b-2 border-[#002147] pb-2 mb-6">Publications & Technical Frameworks</h2>
            
            <div class="flex flex-wrap items-center gap-4 mb-8">
                <span class="text-xs font-bold uppercase text-gray-400">Filter by:</span>
                <button data-filter="All" class="filter-btn active">All Records</button>
                <button data-filter="Thesis" class="filter-btn">Theses</button>
                <button data-filter="Presentation" class="filter-btn">Presentations</button>
            </div>

            <div id="publications-container" class="space-y-8"></div>
        </section>
    </main>

    <footer class="border-t border-gray-200 bg-gray-50 px-6 py-10">
        <div class="container mx-auto max-w-4xl text-center text-xs text-gray-500 uppercase tracking-widest">
            <p>© <span id="year"></span> Swiss Russameekiattisak. Formal Archive.</p>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
