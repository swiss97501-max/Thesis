<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="google-site-verification" content="google872e6dfbcea07200" />
    <title>Swiss Russameekiattisak - Academic Repository</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="min-h-screen bg-[#fafafa]">

    <nav class="sticky top-0 z-50 px-6 py-4 flex justify-between items-center bg-white/90 backdrop-blur-md border-b border-gray-100">
        <div class="flex items-center gap-3">
            <svg width="32" height="32" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
                <rect width="200" height="200" rx="40" fill="#1d4ed8"/> <text x="50%" y="55%" dominant-baseline="middle" text-anchor="middle" font-family="Arial, sans-serif" font-size="80" font-weight="bold" fill="#FFFFFF">SW</text>
            </svg>
            <span class="font-bold text-gray-900 tracking-tight text-lg">Swiss.R</span>
        </div>
    </nav>

    <section class="bg-[#1d4ed8] px-6 py-16 md:py-24 text-white">
        <div class="container mx-auto max-w-4xl text-center">
            <div class="mb-6 inline-flex items-center gap-2 rounded-full bg-white/20 px-4 py-1.5 text-sm text-white">
                <i data-lucide="book-open" class="h-4 w-4"></i>
                <span class="font-medium">Academic Repository</span>
            </div>
            <h1 class="text-4xl font-bold tracking-tight md:text-5xl lg:text-6xl mb-4">
                Swiss Russameekiattisak
            </h1>
            <p class="mx-auto max-w-2xl text-lg text-blue-100 leading-relaxed font-light">
                A collection of theses and presentations in mathematics, physics, and theoretical frameworks.
            </p>
            <a href="https://figshare.com/authors/Swiss_Russameekiattisak/21988793" 
               target="_blank" 
               class="mt-8 inline-flex items-center gap-2 rounded-lg border border-white/30 bg-white/10 px-6 py-3 text-sm font-medium transition-all hover:bg-white/20">
                View on Figshare
                <i data-lucide="external-link" class="h-4 w-4"></i>
            </a>
        </div>
    </section>

    <main class="container mx-auto max-w-4xl px-6 py-16">
        <div class="mb-8 flex flex-col gap-4 sm:flex-row sm:items-center sm:justify-between border-b border-gray-100 pb-6">
            <h2 class="text-2xl font-bold text-gray-900">
                Publications
                <span id="publication-count" class="ml-2 text-base font-normal text-gray-400"></span>
            </h2>
            
            <div class="flex flex-wrap items-center gap-2">
                <i data-lucide="filter" class="h-4 w-4 text-gray-400"></i>
                <button data-filter="All" class="filter-btn active">All</button>
                <button data-filter="Thesis" class="filter-btn">Thesis</button>
                <button data-filter="Presentation" class="filter-btn">Presentation</button>
            </div>
        </div>

        <div id="publications-container" class="grid gap-5"></div>
    </main>

    <footer class="border-t border-gray-100 px-6 py-12 text-center text-sm text-gray-400 bg-white">
        <p>© <span id="year"></span> Swiss Russameekiattisak. All rights reserved.</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
